openapi: 3.0.0
info:
  title: Student Task Manager API
  version: 1.0.0
  description: OpenAPI documentation for Student Task Manager Web App.

servers:
  - url: http://127.0.0.1:5000
    description: Local development server

paths:
  /api/tasks:
    get:
      summary: Get all tasks
      description: Returns a list of all student tasks.
      responses:
        '200':
          description: Successfully returned list of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'

    post:
      summary: Create new task
      description: Creates a new task using the provided title.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
            example:
              title: Prepare practical work documentation
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Task title is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/tasks/{id}:
    patch:
      summary: Update task
      description: Updates task title or completion status by task ID.
      parameters:
        - name: id
          in: path
          required: true
          description: Task ID
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
            example:
              completed: true
      responses:
        '200':
          description: Task updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete task
      description: Deletes a task by task ID.
      parameters:
        - name: id
          in: path
          required: true
          description: Task ID
          schema:
            type: integer
      responses:
        '200':
          description: Task deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Task:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Prepare SSD document
        completed:
          type: boolean
          example: false

    CreateTaskRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          example: Prepare BRD document

    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
          example: Updated task title
        completed:
          type: boolean
          example: true

    DeleteResponse:
      type: object
      properties:
        message:
          type: string
          example: Task deleted successfully

    Error:
      type: object
      properties:
        error:
          type: string
          example: Task not found
